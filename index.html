<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="1번부터 30번 중 랜덤으로 5명의 청소 당번을 공정하게 선정하는 프리미엄 웹앱입니다. 멋진 셔플 효과와 사운드를 경험해 보세요!">
    <title>✨ 청소당번 히어로즈 - 프리미엄 랜덤 추첨기</title>
    
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background glow elements for rich aesthetics -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <!-- Canvas for Confetti Effects -->
    <canvas id="confetti-canvas"></canvas>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <span class="sparkle-icon">✨</span>
                <h1>청소당번 <span class="highlight">히어로즈</span></h1>
            </div>
            <p class="subtitle">공정하고 즐겁게! 오늘 하루 교실을 구원할 영웅들을 선발합니다.</p>
        </header>

        <!-- Dynamic Control Board & Options -->
        <section class="control-panel glass">
            <div class="panel-row">
                <div class="control-group">
                    <label for="range-start">번호 범위</label>
                    <div class="range-inputs">
                        <input type="number" id="range-start" min="1" max="100" value="1">
                        <span>~</span>
                        <input type="number" id="range-end" min="5" max="100" value="30">
                    </div>
                </div>
                <div class="control-group">
                    <label for="pick-count">선발 인원</label>
                    <div class="number-picker">
                        <button type="button" class="btn-picker" id="btn-dec-pick">-</button>
                        <input type="number" id="pick-count" min="1" max="20" value="5" readonly>
                        <button type="button" class="btn-picker" id="btn-inc-pick">+</button>
                    </div>
                </div>
                <div class="control-group audio-toggle-group">
                    <label>효과음</label>
                    <button type="button" id="sound-toggle-btn" class="sound-btn active" aria-label="사운드 켜기/끄기">
                        <svg class="icon-sound-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        <svg class="icon-sound-off hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
                        <span id="sound-status-text">사운드 켬</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Main Layout (Board Grid & Winners Layout) -->
        <main class="main-content">
            <!-- Left Side: Interactive Board -->
            <div class="board-column">
                <div class="board-header">
                    <h2>번호 보드 (<span id="total-count-badge">30</span>개)</h2>
                    <span class="status-indicator" id="status-badge">대기 중</span>
                </div>
                <div class="board-grid-wrapper glass">
                    <div id="number-board" class="number-board-grid">
                        <!-- Numbers will be generated dynamically by JavaScript -->
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button type="button" id="start-draw-btn" class="btn btn-primary btn-glow">
                        <span class="btn-content">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            당번 추첨 시작!
                        </span>
                    </button>
                    <button type="button" id="reset-btn" class="btn btn-secondary">
                        <span class="btn-content">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
                            초기화
                        </span>
                    </button>
                </div>
            </div>

            <!-- Right Side: Winner Cards Showcase -->
            <div class="results-column">
                <h2>오늘의 당번 히어로즈 🏆</h2>
                <div class="winners-container" id="winners-container">
                    <!-- Dynamic winner cards will be placed here -->
                    <div class="empty-results glass">
                        <div class="empty-icon">🎖️</div>
                        <p class="empty-title">아직 선정된 당번이 없습니다</p>
                        <p class="empty-desc">왼쪽의 '당번 추첨 시작!' 버튼을 눌러 영웅들을 소환해 주세요.</p>
                    </div>
                </div>

                <!-- History Section -->
                <div class="history-panel glass">
                    <div class="history-header">
                        <h3>최근 추첨 기록</h3>
                        <button type="button" id="clear-history-btn" class="btn-clear-history">전체 삭제</button>
                    </div>
                    <ul class="history-list" id="history-list">
                        <!-- History items will be placed here -->
                        <li class="empty-history">기록이 없습니다.</li>
                    </ul>
                </div>
            </div>
        </main>
    </div>

    <!-- Script file -->
    <script src="app.js"></script>
</body>
</html>
